version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 15
    assignees:
      - ssbingo
    versioning-strategy: increase
    cooldown:
      default: 7

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 15
    assignees:
      - ssbingo
