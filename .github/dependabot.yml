version: 2
updates:
  - package-ecosystem: npm
    directories:
      - "**/*"
    schedule:
      interval: weekly
    open-pull-requests-limit: 15
    assignees:
      - ssbingo
    versioning-strategy: increase
    cooldown:
      default: 7
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 15
    assignees:
      - ssbingo
