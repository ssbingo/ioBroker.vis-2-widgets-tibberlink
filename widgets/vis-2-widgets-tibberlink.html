<!-- ═══════════════════════════════════════════════════════════════════════
     WIDGET 1 – Aktueller Tibber Preis
     Zeigt den aktuellen Strompreis, Preisstufe und Aufschlüsselung.
     OIDs stammen aus dem tibberlink-Adapter (iobroker.tibberlink).
     ═══════════════════════════════════════════════════════════════════════ -->
<script id="tplVis-2-widgets-tibberlinkPriceCard"
        type="text/ejs"
        class="vis-tpl"
        data-vis-set="vis-2-widgets-tibberlink"
        data-vis-name="Aktueller Tibber Preis"
        data-vis-type="val"
        data-vis-attrs="group.OIDs;oid_total[tibberlink.0.Homes.YourHomeId.CurrentPrice.total]/id;oid_energy[tibberlink.0.Homes.YourHomeId.CurrentPrice.energy]/id;oid_tax[tibberlink.0.Homes.YourHomeId.CurrentPrice.tax]/id;oid_level[tibberlink.0.Homes.YourHomeId.CurrentPrice.level]/id;oid_startsAt[tibberlink.0.Homes.YourHomeId.CurrentPrice.startsAt]/id;group.Darstellung;tib_title[Tibber Strompreis]/text;tib_darkmode[true]/checkbox;show_breakdown[true]/checkbox;currency[ct/kWh]/text"
        data-vis-style="width:280px;height:200px;position:static;"
        data-vis-prev='<div style="background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:14px;padding:14px;width:260px;height:180px;font-family:sans-serif;color:#e0e6ef;box-sizing:border-box;display:flex;flex-direction:column"><div style="font-size:.6rem;text-transform:uppercase;letter-spacing:1px;text-align:center;opacity:.7;margin-bottom:8px">&#9889; Tibber Strompreis</div><div style="font-size:2.4rem;font-weight:700;text-align:center;color:#27ae60;margin-bottom:8px">12.34 ct/kWh</div><div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px"><span style="background:#27ae60;color:#fff;padding:3px 14px;border-radius:10px;font-size:.7rem;font-weight:600">Günstig</span><span style="font-size:.6rem;opacity:.6">14:00 Uhr</span></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;flex:1"><div style="background:rgba(255,255,255,.07);border-radius:8px;padding:8px;text-align:center"><div style="font-size:.55rem;opacity:.65;margin-bottom:3px">Energieanteil</div><div style="font-size:.88rem;font-weight:700;color:#3498db">8.02 ct</div></div><div style="background:rgba(255,255,255,.07);border-radius:8px;padding:8px;text-align:center"><div style="font-size:.55rem;opacity:.65;margin-bottom:3px">Steuer/Abgaben</div><div style="font-size:.88rem;font-weight:700;color:#9b59b6">4.32 ct</div></div></div></div>'>
    <div class="vis-widget <%== this.data.attr('class') %>" style="width:280px;height:200px;" id="<%= this.data.attr('wid') %>"><%
        vis.binds['vis-2-widgets-tibberlink'].createPriceCard(this.data.wid, this.view, this.data, this.style);
    %></div>
</script>


<!-- ═══════════════════════════════════════════════════════════════════════

     Zeigt Start, Ende, Durchschnittspreis und einen Sparkline-Graphen.

us:1px 1px 0 0;opacity:.65"></div><div style="flex:1;background:#52d68a;height:32%;border-radius:1px 1px 0 0;opacity:.65"></div><div style="flex:1;background:#1abc9c;height:26%;border-radius:1px 1px 0 0;opacity:.65"></div></div><div style="font-size:.55rem;text-align:center;opacity:.55;margin-top:4px;flex-shrink:0">Heute · 3 Stunden</div></div>'>

<!-- ═══════════════════════════════════════════════════════════════════════
     WIDGET 3 – Tibber Live Verbrauch
     Zeigt den Echtzeit-Stromverbrauch (erfordert Tibber Pulse).

     ═══════════════════════════════════════════════════════════════════════ -->
<script id="tplVis-2-widgets-tibberlinkLivePower"

        data-vis-type="val"

        data-vis-style="width:280px;height:260px;position:static;"
        data-vis-prev='<div style="background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:14px;padding:14px;width:260px;height:240px;font-family:sans-serif;color:#e0e6ef;box-sizing:border-box;display:flex;flex-direction:column"><div style="font-size:.6rem;text-transform:uppercase;letter-spacing:1px;text-align:center;opacity:.7;margin-bottom:8px;flex-shrink:0">&#9889; Tibber Live</div><div style="font-size:2.6rem;font-weight:700;text-align:center;color:#27ae60;margin-bottom:12px;flex-shrink:0">1.842 kW</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;flex-shrink:0"><div style="background:rgba(255,255,255,.07);border-radius:8px;padding:7px;text-align:center"><div style="font-size:.5rem;opacity:.65;margin-bottom:2px">Min</div><div style="font-size:.82rem;font-weight:700;color:#1abc9c">450 W</div></div><div style="background:rgba(255,255,255,.07);border-radius:8px;padding:7px;text-align:center"><div style="font-size:.5rem;opacity:.65;margin-bottom:2px">Ø Mittel</div><div style="font-size:.82rem;font-weight:700;color:#3498db">1.10 kW</div></div><div style="background:rgba(255,255,255,.07);border-radius:8px;padding:7px;text-align:center"><div style="font-size:.5rem;opacity:.65;margin-bottom:2px">Max</div><div style="font-size:.82rem;font-weight:700;color:#e74c3c">3.20 kW</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;flex:1"><div style="background:rgba(255,255,255,.07);border-radius:8px;padding:8px;text-align:center"><div style="font-size:.55rem;opacity:.65;margin-bottom:3px">Verbrauch heute</div><div style="font-size:.88rem;font-weight:700;color:#27ae60">12.456 kWh</div></div><div style="background:rgba(255,255,255,.07);border-radius:8px;padding:8px;text-align:center"><div style="font-size:.55rem;opacity:.65;margin-bottom:3px">Kosten heute</div><div style="font-size:.88rem;font-weight:700;color:#f39c12">1.87 €</div></div></div></div>'>
    <div class="vis-widget <%== this.data.attr('class') %>" style="width:280px;height:260px;" id="<%= this.data.attr('wid') %>"><%
        vis.binds['vis-2-widgets-tibberlink'].createLivePower(this.data.wid, this.view, this.data, this.style);
    %></div>

<!-- ═══════════════════════════════════════════════════════════════════════
     WIDGET 4 – Tibber Monatskosten
     Summiert Kosten und Verbrauch aus dem jsonDaily-Datensatz für den
     laufenden Kalendermonat. Berechnet Durchschnittspreis und Prognose.
     Voraussetzung: historische Verbrauchsdaten in tibberlink aktiviert.
     ═══════════════════════════════════════════════════════════════════════ -->
<script id="tplVis-2-widgets-tibberlinkMonthlyCost"
        type="text/ejs"
        class="vis-tpl"
        data-vis-set="vis-2-widgets-tibberlink"
        data-vis-name="Tibber Monatskosten"

        data-vis-style="width:280px;height:260px;position:static;"
        data-vis-prev='<div style="background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:14px;padding:14px;width:260px;height:240px;font-family:sans-serif;color:#e0e6ef;box-sizing:border-box;display:flex;flex-direction:column"><div style="font-size:.6rem;text-transform:uppercase;letter-spacing:1px;text-align:center;opacity:.7;margin-bottom:6px;flex-shrink:0">&#9889; Monatskosten</div><div style="font-size:2.4rem;font-weight:700;text-align:center;color:#f39c12;margin-bottom:2px;flex-shrink:0">24.87 &#8364;</div><div style="font-size:.55rem;text-align:center;opacity:.55;margin-bottom:8px;flex-shrink:0">inkl. 8.90 &#8364; Grundgebühr</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;flex-shrink:0"><div style="background:rgba(255,255,255,.07);border-radius:8px;padding:7px;text-align:center"><div style="font-size:.5rem;opacity:.65;margin-bottom:2px">Verbrauch</div><div style="font-size:.82rem;font-weight:700;color:#3498db">87.3 kWh</div></div><div style="background:rgba(255,255,255,.07);border-radius:8px;padding:7px;text-align:center"><div style="font-size:.5rem;opacity:.65;margin-bottom:2px">&#216; Preis</div><div style="font-size:.82rem;font-weight:700;color:#9b59b6">28.5 ct</div></div><div style="background:rgba(255,255,255,.07);border-radius:8px;padding:7px;text-align:center"><div style="font-size:.5rem;opacity:.65;margin-bottom:2px">Prognose</div><div style="font-size:.82rem;font-weight:700;color:#e67e22">42.0 &#8364;</div></div></div><div style="background:rgba(255,255,255,.1);border-radius:4px;height:6px;overflow:hidden;margin-bottom:5px;flex-shrink:0"><div style="background:#27ae60;height:100%;width:60%;border-radius:4px"></div></div><div style="font-size:.55rem;text-align:center;opacity:.55;flex-shrink:0">18 / 30 Tage</div></div>'>

        vis.binds['vis-2-widgets-tibberlink'].createMonthlyCost(this.data.wid, this.view, this.data, this.style);
